name: code-review-env
description: Multi-step code review environment simulating real-world bug detection, impact analysis, and fix suggestion
version: 2.0

entry_point: env.environment:CodeReviewEnv

observation_space:
  type: object
  properties:
    code:
      type: string
    language:
      type: string
    step:
      type: string

action_space:
  type: object
  properties:
    issue:
      type: string
    impact:
      type: string
    fix:
      type: string

reward_range: [0.0, 1.0]